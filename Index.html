<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Ruthless Name Maker | Official Guild Recruitment</title>

<link rel="icon" type="image/png" href="images/tr_logo.jpg">
<link rel="apple-touch-icon" href="images/tr_logo.jpg">

<meta property="og:image" content="assets/mail_bg.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="assets/mail_bg.png">

<!-- Google AdSense verification -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9033385209217128"
crossorigin="anonymous"></script>

<style>
* { box-sizing: border-box; }
body {
margin: 0;
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg,#0d0d0d,#1a0000,#330000);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:20px;
text-align:center;
}

.hero-bg-holder{
width:100%;
max-width:500px;
margin-bottom:-40px;
z-index:-1;
}

.hero-bg-holder img{
width:100%;
border-radius:20px;
box-shadow:0 0 30px #ff000055;
border:1px solid #ff000033;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
margin:20px 0;
border:4px solid #ff0000;
box-shadow:0 0 25px #ff0000aa;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.card{
background:rgba(20,0,0,0.85);
border:2px solid #ff0000;
border-radius:20px;
padding:25px;
max-width:420px;
width:100%;
box-shadow:0 0 20px #ff000088;
margin-bottom:30px;
}

.input-group{
width:100%;
text-align:left;
}

label{
display:block;
margin:10px 0 5px;
font-size:14px;
color:#ffaaaa;
}

input,select{
width:100%;
padding:12px;
border:1px solid #440000;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
background:#111;
color:#fff;
outline:none;
}

button{
width:100%;
padding:14px;
background:#ff0000;
color:#fff;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
font-weight:bold;
text-transform:uppercase;
transition:.3s;
}

.result{
margin-top:20px;
padding:15px;
background:#000;
border-radius:10px;
border:1px dashed #ff0000;
word-break:break-all;
min-height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:1.2rem;
}

.scroll-info{
margin:20px 0;
color:#ff3333;
font-size:14px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,20%,50%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-5px);}
60%{transform:translateY(-3px);}
}

.seo-container{
max-width:420px;
width:100%;
text-align:left;
margin-bottom:40px;
}

details{
background:rgba(255,0,0,.05);
border:1px solid #ff000033;
border-radius:10px;
padding:12px;
margin-bottom:10px;
}

summary{
cursor:pointer;
font-weight:bold;
color:#ff6666;
font-size:14px;
}

.seo-content{
font-size:13px;
color:#ccc;
margin-top:10px;
line-height:1.6;
}

.contact-dropdown{
max-width:420px;
width:100%;
margin-bottom:50px;
}

.leader-box{
display:flex;
align-items:center;
background:rgba(40,0,0,.8);
border:1px solid #ff0000;
border-radius:15px;
padding:12px;
margin-top:10px;
text-decoration:none;
color:white;
}

.leader-img{
width:55px;
height:55px;
border-radius:50%;
border:2px solid #ff0000;
margin-right:15px;
object-fit:cover;
}

.leader-name{
font-weight:bold;
font-size:15px;
display:block;
color:#ff3333;
}

footer{
padding:30px;
font-size:13px;
color:#888;
border-top:1px solid #440000;
width:100%;
background:#050505;
}
</style>
</head>

<body>

<div class="hero-bg-holder">
<img src="assets/mail_bg.png" alt="Team Ruthless Elite Gaming">
</div>

<div class="logo">
<img src="images/tr_logo.jpg" alt="Team Ruthless Logo">
</div>

<div class="card">
<h1>Team Ruthless Name Maker</h1>

<div class="input-group">
<label>Select Gender</label>
<select id="gender">
<option value="male">Male (亗)</option>
<option value="female">Female (♡)</option>
</select>

<label>Enter Username</label>
<input type="text" id="name" placeholder="E.g. Killer">
</div>

<button onclick="generateName()">Generate & Copy</button>

<div class="result" id="result">
Your Name Will Appear Here
</div>
</div>

<div class="scroll-info">
Scroll down to join the hunt! 👇
</div>

<footer>
© Team Ruthless — Official Guild Tool
</footer>

<script>
function generateName(){

let name=document.getElementById("name").value.trim();
let gender=document.getElementById("gender").value;

if(name===""){
document.getElementById("result").innerText="Enter a name first";
return;
}

let symbol = gender==="male" ? "亗" : "♡";

let finalName = "ᵀᴿㅤ"+name+symbol;

document.getElementById("result").innerText=finalName;

navigator.clipboard.writeText(finalName);

}
</script>

</body>
</html>
